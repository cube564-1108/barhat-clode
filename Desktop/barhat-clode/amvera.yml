# Amvera конфигурация для Quality Dashboard

version: 1
runtime: python 3.11

build:
  commands:
    - pip install -r requirements.txt

run:
  command: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
  # Порты и переменные окружения устанавливаются в Amvera UI

environment:
  - FLASK_ENV=production
  - FLASK_DEBUG=0

# В Amvera UI нужно добавить secrets:
# - PYRUS_LOGIN
# - PYRUS_ACCESS_TOKEN
# - SECRET_KEY
# - SECRET_HEADER_NAME (опционально)
# - SECRET_HEADER_VALUE (опционально)
