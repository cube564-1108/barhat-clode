# Amvera конфигурация для Quality Dashboard
# Документация: https://docs.amvera.ru/

version: 1
runtime: python 3.11

build:
  commands:
    - pip install --no-cache-dir -r requirements.txt

run:
  command: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 --access-logfile - --error-logfile -

# Базовые переменные окружения
environment:
  - FLASK_ENV=production
  - FLASK_DEBUG=0
  - PYTHONUNBUFFERED=1

# Переменные окружения для настройки в Amvera UI (Settings → Environment Variables):
# === Обязательные ===
# - PYRUS_LOGIN=your_login
# - PYRUS_ACCESS_TOKEN=your_token
# - SECRET_KEY=your_random_secret_key_min_32_chars
#
# === Опциональные (для защиты через header) ===
# - SECRET_HEADER_NAME=X-Secret-Header
# - SECRET_HEADER_VALUE=your_secret_value
#
# === Персистентность данных ===
# В Amvera настройте mount path для SQLite базы:
# Mount path: /app/data
# Это сохранит базу при перезапусках контейнера

# Health check (опционально, если поддерживается Amvera)
# healthcheck:
#   path: /api/health
#   interval: 30s
#   timeout: 10s
#   retries: 3
