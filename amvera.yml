# Amvera конфигурация для Quality Dashboard

version: 1
runtime: python 3.11

build:
  commands:
    - pip install -r requirements.txt

run:
  command: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300
  # Увеличен timeout до 300 секунд (5 минут) для загрузки 15000+ задач из Pyrus
  # 1 worker чтобы синхронизация была последовательной
  # Порты и переменные окружения устанавливаются в Amvera UI

environment:
  - FLASK_ENV=production
  - FLASK_DEBUG=0
  - DATABASE_PATH=/data/quality_dashboard.db

# Persistent volume для БД (настраивается в Amvera UI)
# Mount path: /data

# В Amvera UI нужно добавить secrets:
# - PYRUS_LOGIN
# - PYRUS_ACCESS_TOKEN
# - SECRET_KEY
# - SECRET_HEADER_NAME (опционально)
# - SECRET_HEADER_VALUE (опционально)
